<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockTrack | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <main id="auth-view" class="view-container">
        <section class="auth-card" aria-labelledby="auth-title">
            <div class="auth-header">
                <div class="brand-mark" aria-hidden="true">ST</div>
                <h1 id="auth-title">StockTrack</h1>
                <p>AI-powered stock watchlist</p>
            </div>

            <div id="authMessage" class="message hidden" role="status" aria-live="polite"></div>

            <form id="authForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" class="form-control" type="email" autocomplete="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" class="form-control" type="password" autocomplete="current-password" placeholder="Enter your password" required>
                </div>

                <div class="auth-actions">
                    <button id="signUpButton" class="btn btn-primary" type="button">Sign Up</button>
                    <button id="loginButton" class="btn btn-outline" type="submit">Login</button>
                </div>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
